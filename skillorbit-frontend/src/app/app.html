<!-- Global Premium UI Backgrounds & Layout -->
<main class="app-layout">
  <!-- React Global Navbar Component Bridge -->
  <app-react-wrapper [reactComponent]="NavbarComponent" [props]="navProps"></app-react-wrapper>

  <!-- Angular Router Outlet for Lazy Loaded Modules -->
  <div class="content-container">
    <router-outlet></router-outlet>
  </div>

  <!-- React Floating Chatbot Component Bridge -->
  <app-react-wrapper [reactComponent]="ChatbotComponent" [props]="chatProps"></app-react-wrapper>
</main>
